<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #f9fafb; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; margin: 0; }
  .demo-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 40px 60px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .logo-text { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .section { display: flex; flex-direction: column; align-items: center; }

  .green  { color: #4CAF50; }
  .purple { color: #7B3FE4; }
  .dark-box { background: #0F172A; border-radius: 16px; padding: 40px 60px; }
  .green-dark  { color: #81C784; }
  .purple-dark { color: #C4B5FD; }
</style>
</head>
<body>

  <div class="section">
    <div class="label">✨ 新版 — 導覽列（白色背景）</div>
    <div class="demo-box">
      <span class="logo-text">
        <span class="green">Here</span><span class="purple">Hear</span><span class="green">.AI</span>
      </span>
    </div>
  </div>

  <div class="section">
    <div class="label">✨ 新版 — Footer（深色背景）</div>
    <div class="dark-box">
      <span class="logo-text">
        <span class="green-dark">Here</span><span class="purple-dark">Hear</span><span class="green-dark">.AI</span>
      </span>
    </div>
  </div>

</body>
</html>
